syntax = "proto3";
package sil;

import "google/protobuf/timestamp.proto";

message ScoringRow {
  google.protobuf.Timestamp stamp = 1;
  double safety = 2;
  double rule_compliance = 3;
  double delay = 4;
  double magnitude = 5;
  double phase = 6;
  double plausibility = 7;
  double total = 8;
}

<text x="40" y="120" fill="rgb(20, 20, 19)" font-family="&quot;Anthropic Sans&quot;, sans-serif" font-size="14" font-weight="500">L3 战术层 — 候选 C · 心智骨架 + 算法插件</text>
<text x="40" y="138" fill="rgb(61, 61, 58)" font-family="&quot;Anthropic Sans&quot;, sans-serif" font-size="12" opacity="0.7">4 阶段心智闭环 (CMM 语义) · 骨架 white-box · 插件可独立替换 · v2 含跨层反馈</text>

<!-- 升级反馈虚线 (红色,Stage 4 → Stage 2,⌐ 形,容器顶部) -->

<svg width="100%" viewBox="0 0 760 620" role="img" xmlns="http://www.w3.org/2000/svg">
<title>L3 战术层候选 C 架构图 v2 (修复 NotebookLM 3 项优化)</title>
<desc>L3 战术层候选 C：心智骨架 + 算法插件。v2 增加：(1) Stage 4 到 Stage 2 反向反馈虚线 (升级触发)；(2) Stage 4 到控制层反射弧虚线 (紧急通道，绕过 Stage 2/3)；(3) Checker 闸门提为跨 Stage 2-3 横向组件；(4) 全 Stage 到 ASDR 的写入流。</desc>

<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1 L8 5 L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arrowRed" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
    <path d="M2 1 L8 5 L2 9" fill="none" stroke="rgb(190, 70, 60)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arrowGray" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
    <path d="M2 1 L8 5 L2 9" fill="none" stroke="rgb(140, 140, 135)" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- 上游 boxes -->
<g style="font-family:&quot;Anthropic Sans&quot;, sans-serif">
  <rect x="55" y="20" width="170" height="48" rx="8" fill="rgb(241, 239, 232)" stroke="rgb(95, 94, 90)" stroke-width="0.5"/>
  <text x="140" y="40" text-anchor="middle" fill="rgb(68, 68, 65)" font-size="14" font-weight="500">感知融合</text>
  <text x="140" y="56" text-anchor="middle" fill="rgb(95, 94, 90)" font-size="12">目标 + ENC + 自船</text>
</g>
<g style="font-family:&quot;Anthropic Sans&quot;, sans-serif">
  <rect x="295" y="20" width="170" height="48" rx="8" fill="rgb(241, 239, 232)" stroke="rgb(95, 94, 90)" stroke-width="0.5"/>
  <text x="380" y="40" text-anchor="middle" fill="rgb(68, 68, 65)" font-size="14" font-weight="500">战略层 (L2)</text>
  <text x="380" y="56" text-anchor="middle" fill="rgb(95, 94, 90)" font-size="12">全局航路 + 时序约束</text>
</g>
<g style="font-family:&quot;Anthropic Sans&quot;, sans-serif">
  <rect x="535" y="20" width="170" height="48" rx="8" fill="rgb(241, 239, 232)" stroke="rgb(95, 94, 90)" stroke-width="0.5"/>
  <text x="620" y="40" text-anchor="middle" fill="rgb(68, 68, 65)" font-size="14" font-weight="500">ROC</text>
  <text x="620" y="56" text-anchor="middle" fill="rgb(95, 94, 90)" font-size="12">override + 模式切换</text>
</g>

<line x1="140" y1="68" x2="140" y2="100" marker-end="url(#arrow)" stroke="rgb(115, 114, 108)" stroke-width="1.5"/>
<line x1="380" y1="68" x2="380" y2="100" marker-end="url(#arrow)" stroke="rgb(115, 114, 108)" stroke-width="1.5"/>
<line x1="620" y1="68" x2="620" y2="100" marker-end="url(#arrow)" stroke="rgb(115, 114, 108)" stroke-width="1.5"/>


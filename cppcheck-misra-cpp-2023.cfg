<?xml version="1.0" encoding="UTF-8"?>
<!--
  MASS L3 TDL — cppcheck MISRA C++:2023 规则基线
  文档: docs/Implementation/static-analysis-policy.md §1-2
  版本: v1.0
  日期: 2026-05-11

  使用方式:
    cppcheck --enable=all --suppressions-list=cppcheck-suppressions.txt \
            --cppcheck-misra-cpp-2023.cfg src/l3_tdl_kernel/

  路径强度:
    - M1/M7 (安全关键): --check-level=exhaustive + MISRA 全 179 规则
    - M2-M6 (决策):    --check-level=exhaustive + MISRA 全 179 规则
    - M8 (HMI):        --check-level=normal + MISRA 裁剪集 (~120 规则)
-->
<project>
  <check-level>exhaustive</check-level>

  <!-- MISRA C++:2023 完整规则集（179 规则） -->
  <addons>
    <addon>misra</addon>
  </addons>

  <misra>
    <!--
      M1/M7 (安全关键) = ALL 179 rules
      用命令行覆盖: cppcheck --misra-rule-texts=M1_M7_required.txt src/l3_tdl_kernel/m1* src/l3_tdl_kernel/m7*
    -->
    <rule-texts>
      <rule-text>required</rule-text>
    </rule-texts>
  </misra>

  <!-- 全局检查启用 -->
  <checks>
    <!-- 错误: 未定义行为、空指针解引用、越界 -->
    <check name="uninitvar"/>
    <check name="uninitMemberVar"/>
    <check name="nullPointer"/>
    <check name="nullPointerDefaultArg"/>
    <check name="nullPointerRedundantCheck"/>
    <check name="arrayIndexOutOfBounds"/>
    <check name="bufferAccessOutOfBounds"/>
    <check name="negativeIndex"/>

    <!-- 资源管理 -->
    <check name="memleak"/>
    <check name="memleakOnRealloc"/>
    <check name="resourceLeak"/>
    <check name="doubleFree"/>
    <check name="deallocDealloc"/>
    <check name="deallocuse"/>
    <check name="mismatchAllocDealloc"/>

    <!-- 类型安全 -->
    <check name="integerOverflow"/>
    <check name="signConversion"/>
    <check name="floatConversionOverflow"/>
    <check name="invalidFunctionArg"/>
    <check name="argumentSize"/>
    <check name="castIntegerToAddressAtReturn"/>
    <check name="truncLongCastAssignment"/>

    <!-- 并发 -->
    <check name="threadException"/>
    <check name="unmatchedLocker"/>

    <!-- 控制流 -->
    <check name="exceptRethrowCopy"/>
    <check name="exceptThrowInDestructor"/>
    <check name="throwInNoexceptFunction"/>
    <check name="missingReturn"/>
    <check name="unreachableCode"/>
    <check name="duplicateBranch"/>
    <check name="duplicateCondition"/>

    <!-- 风格与安全 -->
    <check name="constStatement"/>
    <check name="constParameter"/>
    <check name="constVariable"/>
    <check name="knownConditionTrueFalse"/>
    <check name="identicalInnerCondition"/>
    <check name="selfAssignment"/>
    <check name="selfInitialization"/>
    <check name="virtualCallInConstructor"/>
    <check name="noCopyConstructor"/>
    <check name="noExplicitConstructor"/>
    <check name="operatorEq"/>
    <check name="operatorEqRetRefThis"/>
    <check name="operatorEqShouldBeLeftUnimplemented"/>
    <check name="operatorEqToSelf"/>
    <check name="passedByValue"/>
    <check name="returnByReference"/>
    <check name="danglingTemporaryLifetime"/>
    <check name="danglingReference"/>
    <check name="invalidLifetime"/>
    <check name="invalidContainer"/>
    <check name="invalidIterator"/>
    <check name="invalidPointer"/>
    <check name="stlcstr"/>
    <check name="stlcstrReturn"/>
    <check name="stlOutOfBounds"/>
    <check name="stlBoundaries"/>

    <!-- 可移植性 -->
    <check name="AssignmentAddressToInteger"/>
    <check name="CastAddressToIntegerAtReturn"/>

    <!-- 性能 -->
    <check name="passByValue"/>
    <check name="postfixOperator"/>
    <check name="redundantAssignment"/>
    <check name="redundantCopy"/>
    <check name="redundantInitialization"/>
    <check name="unnecessaryCopy"/>
    <check name="unreadVariable"/>
    <check name="unusedFunction"/>
    <check name="unusedVariable"/>
    <check name="uselessAssignment"/>
    <check name="uselessCalls"/>
  </checks>

  <!-- 项目特定排除 -->
  <excludes>
    <!-- 第三方库 -->
    <exclude>build/</exclude>
    <exclude>install/</exclude>
    <exclude>.worktrees/</exclude>
    <!-- 测试文件（允许测试中有意违规） -->
    <exclude>test/</exclude>
    <exclude>tests/</exclude>
  </excludes>

  <!-- 项目特定宏定义（避免 cppcheck 误报） -->
  <defines>
    <define name="MASS_L3_NODISCARD" value="[[nodiscard]]"/>
    <define name="MASS_L3_NOEXCEPT" value="noexcept"/>
    <define name="MASS_L3_UNREACHABLE" value="__builtin_unreachable()"/>
    <define name="MASS_L3_ASSERT(x)" value=""/>
    <define name="PLUGINLIB_EXPORT_CLASS(x,y)" value=""/>
  </defines>
</project>

# MASS L3 TDL — GitLab CI 5 阶段 Pipeline
# 详见: docs/Implementation/ci-cd-pipeline.md
# Wave 0 修订: F-CRIT-A-007 (删除 || true) + F-CRIT-A-008 (补全 jobs) + F-IMP-A-007/008 (cache + integration)

stages:
  - lint
  - unit-test
  - static-analysis
  - integration-test
  - release

variables:
  FULL_PIPELINE: "false"
  RUN_RELEASE: "false"

workflow:
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      variables:
        FULL_PIPELINE: "true"
        RUN_RELEASE: "true"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      variables:
        FULL_PIPELINE: "true"
        RUN_RELEASE: "false"
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
      variables:
        FULL_PIPELINE: "true"
        RUN_RELEASE: "true"
    - if: $CI_COMMIT_BRANCH =~ /^feature\//
      variables:
        FULL_PIPELINE: "false"
        RUN_RELEASE: "false"
    - when: never

default:
  image: mass-l3/ci:jazzy-ubuntu22.04
  cache:
    - key: ccache-${CI_COMMIT_REF_SLUG}
      paths:
        - .ccache/
      policy: pull-push
  before_script:
    - export CCACHE_DIR=$CI_PROJECT_DIR/.ccache
    - export CCACHE_MAXSIZE=5G
    - ccache --zero-stats
  after_script:
    - ccache --show-stats
  retry:
    max: 2
    when:
      - runner_system_failure
      - stuck_or_timeout_failure
      - api_failure
  timeout: 60 minutes

# Vendor 依赖（git submodule init）— Wave 0 第一次 pipeline 触发自动 fetch
.pre_vendor_libs:
  stage: .pre
  cache:
    - key: vendor-libs-v1
      paths:
        - tools/third-party/eigen-5.0.0
        - tools/third-party/spdlog-1.17.0
        - tools/third-party/fmt-11.0.2
        - tools/third-party/yaml-cpp-0.8.0
        - tools/third-party/nlohmann-json-3.12.0
        - tools/third-party/googletest-1.17.0
        - tools/third-party/tl-expected-1.1.0
        - tools/third-party/geographiclib-2.7
        - tools/third-party/casadi-3.7.2
        - tools/third-party/ipopt-3.14.19
        - tools/third-party/boost-1.91.0
      policy: pull-push
  script:
    - git submodule update --init --recursive --depth 1

detect-changes:
  stage: .pre
  script:
    - |
      CHANGED_PKGS=$(git diff --name-only origin/main...HEAD | \
                     awk -F/ '/^src\// {print $2}' | sort -u | tr '\n' ' ')
      echo "CHANGED_PACKAGES=$CHANGED_PKGS" >> build.env
      echo "Affected packages: $CHANGED_PKGS"
  artifacts:
    reports:
      dotenv: build.env

# ===============================================================
# Stage 1: Lint
# ===============================================================
stage-1-lint:
  stage: lint
  needs: []
  rules:
    - if: $FULL_PIPELINE == "true" || $CI_COMMIT_BRANCH =~ /^feature\//
  script:
    # C++ format check (BLOCKING — F-CRIT-A-007 修复：删除 || true)
    - find src -name "*.cpp" -o -name "*.hpp" | xargs -r clang-format-20 --dry-run --Werror
    # Python lint (BLOCKING)
    - ruff check src/m2_world_model/python tools/ src/m8_hmi_transparency_bridge/python
    - mypy src/m2_world_model/python tools/ src/m8_hmi_transparency_bridge/python
    # ROS2 .msg checks
    - bash tools/ci/check-msg-naming.sh
    - bash tools/ci/check-msg-contract.sh
    # commit message format
    - bash tools/ci/check-commit-msg.sh
  artifacts:
    when: always
    reports:
      codequality: build/lint-quality.json

multi_vessel_lint:
  stage: lint
  needs: []
  rules:
    - if: $FULL_PIPELINE == "true" || $CI_COMMIT_BRANCH =~ /^feature\//
  script:
    - |
      echo "=== Multi-vessel lint: scanning for vessel-specific literals ==="
      grep -rn --include="*.py" -E "(\bFCB\b|45\s*m\b|18\s*kn\b|22\s*kn\b|ROT_max\s*=\s*[0-9]|sog\s*<=?\s*30)" src/ > multi_vessel_lint_report.txt 2>&1 || true
      HITS=$(wc -l < multi_vessel_lint_report.txt | tr -d ' ')
      echo "Violations found: $HITS"
      if [ "$HITS" -gt "0" ]; then
        echo "WARNING: Vessel-specific literals detected (see artifact)"
        cat multi_vessel_lint_report.txt
      else
        echo "OK: No vessel-specific literals found in src/"
      fi
  artifacts:
    when: always
    paths:
      - multi_vessel_lint_report.txt
    expire_in: 7 days

path_s_dry_run:
  stage: lint
  needs: []
  rules:
    - if: $FULL_PIPELINE == "true" || $CI_COMMIT_BRANCH =~ /^feature\//
  script:
    - |
      echo "=== PATH-S dry run: checking Doer-Checker independence ==="
      grep -rn --include="*.py" -E "(from\s+m7_safety_supervisor|import\s+m7_safety_supervisor|#include.*m7.checker)" \
        src/m1_odd_envelope_manager/ \
        src/m2_world_model/ \
        src/m3_mission_manager/ \
        src/m4_behavior_arbiter/ \
        src/m5_tactical_planner/ \
        src/m6_colregs_reasoner/ \
        2>/dev/null > path_s_report.txt || true
      HITS=$(wc -l < path_s_report.txt | tr -d ' ')
      echo "Doer→Checker violations (Python): $HITS"
      # --- C++ boundary detection (D1.2 addition) ---
      grep -rn --include="*.cpp" --include="*.hpp" \
        -E '#include\s*[<"]m7_safety_supervisor/' \
        src/m1_odd_envelope_manager/ src/m2_world_model/ \
        src/m3_mission_manager/ src/m4_behavior_arbiter/ \
        src/m5_tactical_planner/ src/m6_colregs_reasoner/ \
        2>/dev/null >> path_s_report.txt || true
      CPP_HITS=$(grep -cE '\.(cpp|hpp):' path_s_report.txt 2>/dev/null || echo 0)
      echo "C++ Doer→Checker violations: ${CPP_HITS}"
      HITS=$((HITS + CPP_HITS))
      if [ "$HITS" -gt "0" ]; then
        echo "WARNING: Doer→Checker boundary violations detected (Python+C++)"
        cat path_s_report.txt
      else
        echo "OK: No Doer→Checker violations (Python + C++)"
      fi
  allow_failure: true
  artifacts:
    when: always
    paths:
      - path_s_report.txt
    expire_in: 7 days

# ===============================================================
# Stage 2: Unit Test (含 ASan + UBSan + Coverage)
# ===============================================================
stage-2-unit-test:
  stage: unit-test
  needs: [stage-1-lint]
  rules:
    - if: $FULL_PIPELINE == "true"
  parallel:
    matrix:
      - PACKAGE: [m1_odd_envelope_manager, m2_world_model, m3_mission_manager,
                  m4_behavior_arbiter, m5_tactical_planner, m6_colregs_reasoner,
                  m7_safety_supervisor, m8_hmi_transparency_bridge, l3_msgs]
  cache:
    - key: ccache-${CI_COMMIT_REF_SLUG}
      paths:
        - .ccache/
      policy: pull-push
    - key: colcon-build-${CI_COMMIT_REF_SLUG}-${PACKAGE}
      paths:
        - "build/${PACKAGE}/"
        - "install/${PACKAGE}/"
      policy: pull-push
  script:
    - source /opt/ros/jazzy/setup.bash
    - colcon build --packages-up-to ${PACKAGE} \
        --cmake-args -DCMAKE_BUILD_TYPE=Debug \
                     -DCMAKE_CXX_FLAGS="-fprofile-arcs -ftest-coverage -fsanitize=address,undefined -fno-omit-frame-pointer" \
                     -DCMAKE_EXE_LINKER_FLAGS="-fprofile-arcs -ftest-coverage -fsanitize=address,undefined"
    - ASAN_OPTIONS=halt_on_error=1:abort_on_error=1:detect_leaks=1 \
      UBSAN_OPTIONS=halt_on_error=1:print_stacktrace=1 \
      colcon test --packages-select ${PACKAGE} --return-code-on-test-failure
    - colcon test-result --verbose --test-result-base build/${PACKAGE}
    # Coverage report
    - lcov --capture --directory build/${PACKAGE} --output-file coverage-${PACKAGE}.info
    - lcov --remove coverage-${PACKAGE}.info "*/test/*" "*/install/*" --output-file coverage-${PACKAGE}.info
    - genhtml coverage-${PACKAGE}.info --output-directory coverage-html-${PACKAGE}
    - bash tools/ci/check-coverage-threshold.sh coverage-${PACKAGE}.info ${PACKAGE}
  artifacts:
    when: always
    paths:
      - coverage-html-${PACKAGE}/
      - coverage-${PACKAGE}.info
    reports:
      junit: build/${PACKAGE}/test_results/**/*.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage-${PACKAGE}.xml
  coverage: '/lines\.+:\s+(\d+\.\d+)%/'

stage-2-pytest:
  stage: unit-test
  needs: [stage-1-lint]
  rules:
    - if: $FULL_PIPELINE == "true"
      changes:
        - src/m2_world_model/python/**/*
        - src/m8_hmi_transparency_bridge/python/**/*
        - src/l3_external_mock_publisher/**/*
        - tools/**/*
  script:
    - |
      if find tests/python -name "*.py" -print -quit 2>/dev/null | grep -q .; then
        pytest --cov=src/m2_world_model/python \
               --cov=src/m8_hmi_transparency_bridge/python \
               --cov=src/l3_external_mock_publisher \
               --cov-report=html:coverage-py-html \
               --cov-report=xml:coverage-py.xml \
               --cov-report=term-missing \
               --cov-fail-under=90 \
               --junit-xml=build/pytest-junit.xml \
               tests/python/
      else
        echo "INFO: no .py files found in tests/python/ (Wave 0 skip)" && exit 0
      fi
  artifacts:
    when: always
    paths:
      - coverage-py-html/
    reports:
      junit: build/pytest-junit.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage-py.xml

# ===============================================================
# Stage 3: Static Analysis
# ===============================================================
stage-3-clang-tidy:
  stage: static-analysis
  needs: [stage-2-unit-test]
  rules:
    - if: $FULL_PIPELINE == "true"
  parallel:
    matrix:
      - PACKAGE: [m1_odd_envelope_manager, m2_world_model, m3_mission_manager,
                  m4_behavior_arbiter, m5_tactical_planner, m6_colregs_reasoner,
                  m7_safety_supervisor, m8_hmi_transparency_bridge]
  script:
    - source /opt/ros/jazzy/setup.bash
    - colcon build --packages-select ${PACKAGE} --cmake-args -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
    # PATH-S 路径用 .clang-tidy.path-s（更严阈值）
    - |
      if [[ "$PACKAGE" == "m1_odd_envelope_manager" || "$PACKAGE" == "m7_safety_supervisor" ]]; then
        CONFIG=".clang-tidy.path-s"
      else
        CONFIG=".clang-tidy"
      fi
    - run-clang-tidy-20 -p build/${PACKAGE} \
                        -config-file=${CONFIG} \
                        -warnings-as-errors='*' \
                        -export-fixes=clang-tidy-fixes-${PACKAGE}.yaml \
                        $(find src/${PACKAGE} -name "*.cpp")
  artifacts:
    when: always
    paths:
      - clang-tidy-fixes-${PACKAGE}.yaml
    reports:
      codequality: build/clang-tidy-${PACKAGE}.sarif

stage-3-cppcheck-misra:
  stage: static-analysis
  needs: [stage-2-unit-test]
  rules:
    - if: $FULL_PIPELINE == "true"
  parallel:
    matrix:
      - PACKAGE: [m1_odd_envelope_manager, m2_world_model, m3_mission_manager,
                  m4_behavior_arbiter, m5_tactical_planner, m6_colregs_reasoner,
                  m7_safety_supervisor, m8_hmi_transparency_bridge]
  script:
    # cppcheck Premium 在 mass-l3/ci:jazzy-ubuntu22.04 镜像中预装
    # 如商业 license 暂不可用，fallback 到 OSS cppcheck（PATH-D/H 可降级，PATH-S 必须 Premium）
    - |
      if command -v cppcheck-premium &> /dev/null; then
        cppcheck-premium --project=src/${PACKAGE}/cppcheck.cfg \
                         --addon=misra-cpp-2023 \
                         --inline-suppr \
                         --error-exitcode=1 \
                         --output-file=build/cppcheck-${PACKAGE}.sarif \
                         --xml --xml-version=2 \
                         2> build/cppcheck-${PACKAGE}.xml
      else
        echo "WARNING: cppcheck Premium 不可用，fallback 到 OSS cppcheck"
        cppcheck --enable=all --error-exitcode=1 \
                 --inline-suppr \
                 --suppress=missingIncludeSystem \
                 --xml --xml-version=2 \
                 src/${PACKAGE} 2> build/cppcheck-${PACKAGE}.xml
      fi
  artifacts:
    when: always
    paths:
      - build/cppcheck-*.xml
      - build/cppcheck-*.sarif
    reports:
      codequality: build/cppcheck-${PACKAGE}.sarif

stage-3-polyspace-path-s:
  stage: static-analysis
  needs: [stage-2-unit-test]
  rules:
    - if: $CI_COMMIT_BRANCH == "main" || $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - src/m1_odd_envelope_manager/**/*
        - src/m7_safety_supervisor/**/*
  parallel:
    matrix:
      - PACKAGE: [m1_odd_envelope_manager, m7_safety_supervisor]
  variables:
    POLYSPACE_LICENSE_FILE: "${POLYSPACE_LIC}"
  timeout: 90 minutes
  id_tokens:
    VAULT_AUTH_TOKEN:
      aud: https://vault.example.com
  secrets:
    POLYSPACE_LIC:
      vault: kv/data/mass-l3/polyspace_license@secret
      file: true
  script:
    - |
      if ! command -v polyspace-bug-finder-server &> /dev/null; then
        echo "WARNING: Polyspace CLI 不在容器中（PATH-S 路径无法完成形式化验证）"
        echo "FATAL: 须修复 Dockerfile.ci 加 Polyspace 占位结构 (F-CRIT-A-009)"
        exit 1
      fi
    - polyspace-bug-finder-server -prog ${PACKAGE} \
                                  -lang cpp -cpp-version cpp17 \
                                  -sources-list-file build/${PACKAGE}/sources.txt \
                                  -checkers MISRA_Cpp_2023_Mandatory,MISRA_Cpp_2023_Required,IEC_61508_Mandatory \
                                  -results-dir build/polyspace-${PACKAGE}
    - polyspace-code-prover-server -prog ${PACKAGE} \
                                   -lang cpp -cpp-version cpp17 \
                                   -sources-list-file build/${PACKAGE}/sources.txt \
                                   -results-dir build/polyspace-${PACKAGE}-cp
    - polyspace-results-export -results-dir build/polyspace-${PACKAGE} \
                               -format html \
                               -output-name build/polyspace-${PACKAGE}-report.html
    # 阈值检查：Red = 0 / Orange ≤ 1%
    - bash tools/ci/check-polyspace-thresholds.sh build/polyspace-${PACKAGE}
  artifacts:
    when: always
    paths:
      - build/polyspace-${PACKAGE}-report.html
      - build/polyspace-${PACKAGE}/

stage-3-tsan:
  stage: static-analysis
  needs: [stage-2-unit-test]
  rules:
    - if: $FULL_PIPELINE == "true"
      changes:
        - src/m2_world_model/**/*
        - src/m5_tactical_planner/**/*
  parallel:
    matrix:
      - PACKAGE: [m2_world_model, m5_tactical_planner]
  script:
    - source /opt/ros/jazzy/setup.bash
    - colcon build --packages-select ${PACKAGE} \
        --cmake-args -DCMAKE_BUILD_TYPE=Debug \
                     -DCMAKE_CXX_FLAGS="-fsanitize=thread -fno-omit-frame-pointer"
    - TSAN_OPTIONS=halt_on_error=1 colcon test --packages-select ${PACKAGE}

stage-3-doer-checker-independence:
  stage: static-analysis
  needs: [stage-1-lint]
  script:
    - bash tools/ci/check-doer-checker-independence.sh
  allow_failure: false   # 决策四 + ADR-001 — 不可豁免

# ===============================================================
# Stage 4: Integration Test
# ===============================================================
stage-4-integration:
  stage: integration-test
  needs: [stage-3-clang-tidy, stage-3-cppcheck-misra, stage-3-doer-checker-independence]
  rules:
    - if: $CI_COMMIT_BRANCH == "main" || $CI_PIPELINE_SOURCE == "merge_request_event"
  script:
    - source /opt/ros/jazzy/setup.bash
    - colcon build
    - source install/setup.bash
    # INT-001..INT-008 集成场景（详见 docs/Test Plan/integration-test-spec.md）
    - ros2 launch tools/ci/full_l3_stack.launch.py &
    - L3_PID=$!
    - sleep 5
    # Run C++ GTest integration tests via colcon
    - colcon test --packages-select l3_integration_tests --event-handlers console_direct+
    - colcon test-result --verbose
    - pytest tests/integration/ --junit-xml=build/integration-junit.xml --timeout=300
    - kill $L3_PID
    # 接口契约校验（始终运行）
    - bash tools/ci/check-msg-contract.sh
  artifacts:
    when: always
    paths:
      - logs/integration/
    reports:
      junit: build/integration-junit.xml

# ===============================================================
# Stage 5: Release
# ===============================================================
stage-5-release:
  stage: release
  needs: [stage-4-integration]
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
      when: on_success
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
  script:
    - source /opt/ros/jazzy/setup.bash
    - colcon build --cmake-args -DCMAKE_BUILD_TYPE=Release
    # 打包 colcon install 为 tarball
    - tar -czf mass-l3-tdl-${CI_COMMIT_TAG:-${CI_COMMIT_SHA:0:8}}.tar.gz install/
    # SBOM (CycloneDX)
    - |
      if command -v syft &> /dev/null; then
        syft packages dir:install -o cyclonedx-json > sbom-${CI_COMMIT_TAG:-${CI_COMMIT_SHA:0:8}}.json
        bash tools/ci/sbom-license-check.sh sbom-${CI_COMMIT_TAG:-${CI_COMMIT_SHA:0:8}}.json || echo "license-check pending implementation"
      else
        echo "INFO: syft 不可用，跳过 SBOM 生成（Wave 0 暂可，CCS 入级前必须修复）"
      fi
  artifacts:
    paths:
      - "mass-l3-tdl-*.tar.gz"
      - "sbom-*.json"
    expire_in: never

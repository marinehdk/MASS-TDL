version: "3.9"

services:
  sil-orchestrator:
    build:
      context: .
      dockerfile: docker/sil_orchestrator.Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./scenarios:/var/sil/scenarios
      - ./runs:/var/sil/runs
      - ./exports:/var/sil/exports
    environment:
      - ROS_DOMAIN_ID=0
    network_mode: host

  sil-component-container:
    build:
      context: .
      dockerfile: docker/sil_nodes.Dockerfile
    command: >
      ros2 run rclcpp_components component_container_mt
      --ros-args -r __node:=sil_container
    volumes:
      - ./scenarios:/var/sil/scenarios
      - ./runs:/var/sil/runs
    environment:
      - ROS_DOMAIN_ID=0
    network_mode: host

  foxglove-bridge:
    image: ghcr.io/foxglove/ros-foxglove-bridge:humble
    command: >
      ros2 launch foxglove_bridge foxglove_bridge_launch.xml
      port:=8765
      config_file:=/config/foxglove_bridge.yaml
    volumes:
      - ./config/foxglove_bridge.yaml:/config/foxglove_bridge.yaml
    environment:
      - ROS_DOMAIN_ID=0
    network_mode: host

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      - sil-orchestrator

  martin-tile-server:
    image: ghcr.io/maplibre/martin:latest
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - ./data/tiles:/data/tiles
    # Automatically scan the /data/tiles directory for any .mbtiles files
    # and serve them dynamically at /<filename>
    command: ["/data/tiles"]
    network_mode: host

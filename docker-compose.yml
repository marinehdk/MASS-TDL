# NOTE: demo services (demo-server, demo_ws, etc.) were run standalone,
# not via docker-compose. This compose file is ROS2-only (SIL + viz stack).
version: "3.9"

services:
  sil-orchestrator:
    build:
      context: .
      dockerfile: docker/sil_orchestrator.Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./scenarios:/var/sil/scenarios
      - ./runs:/var/sil/runs
      - ./exports:/var/sil/exports
    environment:
      - ROS_DOMAIN_ID=0
    network_mode: host

  sil-nodes:
    build:
      context: .
      dockerfile: docker/sil_nodes.Dockerfile
    volumes:
      - ./scenarios:/var/sil/scenarios
      - ./runs:/var/sil/runs
    command: >
      bash -c "apt-get update -qq && apt-get install -y -qq ros-humble-rmw-cyclonedds-cpp && /opt/ws/sil_entrypoint.sh"
    environment:
      - SIL_RUN_DIR=/var/sil/runs
      - ROS_DOMAIN_ID=0
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
    network_mode: host

  foxglove-bridge:
    image: mass-l3/ci:humble-ubuntu22.04
    volumes:
      - ./.docker/sil_install:/opt/sil_install:ro
    command: |
      bash -c '
        apt-get update -qq && apt-get install -y -qq ros-humble-rmw-cyclonedds-cpp 2>/dev/null &&
        source /opt/ros/humble/setup.bash &&
        source /opt/sil_install/setup.bash &&
        ros2 run foxglove_bridge foxglove_bridge \
          --ros-args \
          -p port:=8765 \
          -p num_threads:=4 \
          -p send_buffer_limit:=10000000 \
          -p use_sim_time:=true \
          -p topic_whitelist:="[/sim_clock,/sil/own_ship_state,/sil/target_vessel_state,/sil/radar_meas,/sil/ais_msg,/sil/environment,/sil/tracked_targets,/sil/lifecycle_status,/sil/module_pulse,/sil/scoring,/sil/asdr_event]"
      '
    environment:
      - ROS_DOMAIN_ID=0
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
    network_mode: "service:sil-nodes"
    restart: unless-stopped
    depends_on:
      - sil-nodes

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      - sil-orchestrator

  martin-tile-server:
    image: ghcr.io/maplibre/martin:latest
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - ./data/tiles:/data/tiles
    command: ["/data/tiles"]
    network_mode: host

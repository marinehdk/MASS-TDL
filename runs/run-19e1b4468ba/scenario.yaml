# Imazu-22 Problem 14: Head-on encounter
# Spec: docs/Design/SIL/2026-05-12-sil-architecture-design.md §7.1
scenario:
  id: "r14-head-on"
  name: "Imazu-22 R14 Head-on"
  encounter_type: "head-on"
  description: "Own ship and target vessel approaching head-on, COLREGs Rule 14 applies"

own_ship:
  initial:
    lat: 63.4400
    lon: 10.4000
    heading_deg: 0.0
    sog_kn: 12.0
  hull_class: "SEMI_PLANING"
  length_oa_m: 45.0
  breadth_m: 9.0
  draft_m: 2.5

targets:
  - mmsi: 100000001
    name: "Target A"
    ship_type: "CARGO"
    initial:
      lat: 63.4450
      lon: 10.4000
      heading_deg: 180.0
      sog_kn: 10.0
    mode: "replay"

environment:
  wind:
    direction_deg: 270
    speed_mps: 5.0
  current:
    direction_deg: 0
    speed_mps: 0.5
  visibility_nm: 10.0
  sea_state_beaufort: 3

simulation:
  duration_s: 600
  tick_hz: 50
  dt_s: 0.02

expected:
  rule_triggered: "Rule 14 (Head-on)"
  min_cpa_nm: 0.5
  colregs_compliant: true

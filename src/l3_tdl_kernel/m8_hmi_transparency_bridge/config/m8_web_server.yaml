m8_web_backend:
  ros__parameters:
    fastapi_host: "0.0.0.0"
    fastapi_port: 8080
    cors_allowed_origins:
      - "http://localhost:3000"
      - "http://hmi.roc.local"
    websocket_max_clients: 8

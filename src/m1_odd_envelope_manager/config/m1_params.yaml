# M1 ODD/Envelope Manager parameters
# All [TBD-HAZID] values: FCB initial baselines, to be calibrated in HAZID Phase 2

state_machine:
  in_to_edge: 0.8                  # [TBD-HAZID] score threshold for IN->EDGE
  edge_to_out: 0.5                 # [TBD-HAZID] score threshold for EDGE->OUT
  stale_degradation_factor: 0.5    # [TBD-HAZID] score multiplier when inputs stale

conformance_score:
  weights:
    w_e: 0.4             # [TBD-HAZID] environment weight
    w_t: 0.3             # [TBD-HAZID] task weight
    w_h: 0.3             # [TBD-HAZID] human weight
  e_score:
    visibility_full_nm: 2.0        # visibility >= this -> ODD-A (full)
    visibility_degraded_nm: 1.0    # visibility >= this -> ODD-B (degraded)
    visibility_marginal_nm: 0.5    # visibility >= this -> ODD-D (marginal, OR)
    sea_state_full_hs: 2.5         # Hs <= this -> ODD-A (full)
    sea_state_degraded_hs: 3.0     # Hs <= this -> ODD-B (degraded)
    sea_state_marginal_hs: 4.0     # Hs <= this -> ODD-D (marginal, OR)

t_score:
  comm_delay_ok_s: 2.0     # [TBD-HAZID] comm RTT threshold for "ok" classification [s]
  comm_ok: 0.6             # [TBD-HAZID] T-score when sensor degraded but comm within limit
  comm_bad: 0.3            # [TBD-HAZID] T-score when comm late or critical sensor failure

h_score:
  available: 1.0           # [TBD-HAZID] H-score when TMR available and comm OK
  unavailable: 0.5         # [TBD-HAZID] H-score when TMR not available

tmr_tdl:
  tmr_baseline_s: 60.0    # [TBD-HAZID] Veitch 2024 baseline [s]
  tcpa_coefficient: 0.6   # [TBD-HAZID] TCPA * coefficient for TDL component
  tmr_min_s: 30.0         # minimum TMR clamp [s]
  tmr_max_s: 600.0        # maximum TMR clamp [s]
  tdl_min_s: 0.0          # minimum TDL clamp [s]
  tdl_max_s: 600.0        # maximum TDL clamp [s]

mrc:
  max_anchor_depth_m: 50.0           # [TBD-HAZID] maximum water depth for anchoring [m]
  max_heave_to_sea_state_hs: 4.0     # [TBD-HAZID] maximum Hs for heave-to [m]
  max_heave_to_wind_kn: 40.0         # [TBD-HAZID] maximum wind speed for heave-to [kn]
